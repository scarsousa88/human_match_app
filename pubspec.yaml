name: human_match_app
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.4+4

environment:
  sdk: ^3.11.0

dependencies:
  ffi: ^2.1.0
  path_provider: ^2.1.4
  flutter:
    sdk: flutter
  timezone: any
  google_mobile_ads: ^7.0.0

  cupertino_icons: ^1.0.8
  firebase_core: ^4.5.0
  firebase_auth: ^6.2.0
  cloud_firestore: ^6.1.3
  cloud_functions: ^6.0.7
  flutter_localizations:
    sdk: flutter
  intl: ^0.20.0
  flutter_svg: ^2.0.10+1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_launcher_icons: ^0.14.4

  flutter_lints: ^6.0.0

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/icon.png"
  adaptive_icon_background: "#3E1E4F"
  adaptive_icon_foreground: "assets/icon/icon.png"
  adaptive_icon_round_icon: true


flutter:
  generate: true # ATIVADO: Para gerar ficheiros de tradução automaticamente
  uses-material-design: true

  assets:
    - assets/places/europe_places.json
    - assets/ephe/
    - assets/icon/icon.png
    - assets/icon/card.png
    - assets/icon/compare.png
    - assets/icon/loading.svg
