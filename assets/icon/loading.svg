
<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <!-- Círculo exterior fixo -->
  <circle cx="50" cy="50" r="42" fill="none" stroke="#FFFFFF" stroke-width="3"/>

  <!-- Hexágono a rodar (nomeado para animação) -->
  <g id="hexagon">
    <polygon points="50,8 80.5,25 80.5,75 50,92 19.5,75 19.5,25" 
             fill="none" stroke="#FFFFFF" stroke-width="3" stroke-linejoin="round"/>
  </g>

  <!-- Ponto central dourado fixo -->
  <circle id="center-dot" cx="50" cy="50" r="5" fill="#FFC857"/>
</svg>
